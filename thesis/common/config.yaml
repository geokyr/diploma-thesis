logging:
  max_file_size: 10485760
  backup_count: 5

dirname:
  simulation: simulation
  outputs: outputs
  data: data
  logs: logs
  plots: plots
  models: models
  results: results
  appdata: appdata
  misc: misc
  common: common
  stable_models: baseline_stable

filename:
  osm_data: osm_bbox.osm.xml.gz
  gui_settings: osm.view.xml
  poly: osm.poly.xml.gz
  network_base: osm.net.xml.gz
  network_rain: osm-rain.net.xml.gz
  routes_temp: routes.rou.xml
  logs: logs.log
  results: results.json
  research_results: research_results.csv
  tuning_results: tuning_results.json
  feature_calibrator: feature_calibrator.joblib
  trips_parquet: trips.parquet
  model: model.joblib
  metadata: metadata.json
  feature_selection_results: feature_selection_results.csv
  simulation_report: simulation_report.pdf
  
suffix:
  trips: .trips.xml
  sumocfg: .sumocfg
  fcd_csv: -fcd.csv
  fcd_parquet: -fcd.parquet

network:
  bbox: [23.725252771719436, 37.974745936977456, 23.752735758169127, 37.988290142332225]
  road_types: |
    {
      "Highway": ["motorway", "motorway_link", "trunk", "trunk_link", "primary", "primary_link", "secondary", "secondary_link", "tertiary", "tertiary_link", "unclassified", "residential", "living_street", "unsurfaced", "service", "raceway", "bus_guideway", "track", "footway", "pedestrian", "path", "bridleway", "cycleway", "step", "steps", "stairs"],
      "Railway": ["preserved", "tram", "subway", "light_rail", "rail", "highspeed", "monorail"],
      "Aeroway": ["stopway", "parking_position", "taxiway", "taxilane", "runway", "highway_strip"],
      "Waterway": ["river", "canal"],
      "Aerialway": ["cable_car", "gondola"],
      "Route": ["ferry"]
    }
  vehicle_classes: passenger
  netconvert_options: --geometry.remove,--roundabouts.guess,--ramps.guess,--junctions.join,--tls.guess-signals,--tls.discard-simple,--tls.join,--output.original-names,--junctions.corner-detail,5,--output.street-names,--tls.default-type,actuated
  polyconvert_options: --verbose,--osm.keep-full-type,--osm.merge-relations,1
  friction: 0.4
  view_settings: |
    <viewsettings>
        <scheme name="real world"/>
        <delay value="20"/>
    </viewsettings>

seed:
  default: 42
  train: 13
  test: 2025
  rain: 314159

simulation:
  traffic_generation_periods_mean: 1.0
  traffic_generation_periods_std: 0.01
  traffic_generation_periods: [0.50, 0.55, 0.65, 0.75, 0.80, 0.80, 0.75, 0.65, 0.65, 0.60]
  tls_actuated_jam_threshold: 30
  device_rerouting_adaptation_steps: 18
  device_rerouting_adaptation_interval: 10
  fcd_output_attributes: id,x,y,speed,lane,odometer,fuel,waiting
  start_time: 0
  end_time: 36000
  device_friction_probability: 1.0

external:
  zenodo_dataset_api_url: https://zenodo.org/api/records/16950674

eta:
  target_column: duration
  chunk_size: 8192
  min_duration: 30
  min_distance: 200
  augmentation_rate: 0.0
  min_trip_ratio: 0.5
  num_retraining_trips: 10000
  n_bins: 10
  n_splits: 5
  n_training_samples: 53229
  shrink_factor: 0.7

features:
  morning_ceiling: 2
  noon_floor: 3
  noon_ceiling: 6
  afternoon_floor: 7
  rush_hours: [0, 1, 8, 9]
  percentile_thresholds: [25, 50, 75]
  num_freqs: 2
  coordinate_scale: 1000
  cell: 100
  n_clusters: 20
  n_components: 2
  correlation_threshold: 0.95
  permutation_importance_n_repeats: 100
  permutation_importance_scoring: "neg_mean_absolute_error"
  permutation_importance_n_jobs: -1
  ranking_alpha: 0.5

models:
  objective_xgboost: reg:absoluteerror
  objective_lightgbm: regression_l1
  loss_function_catboost: MAE
  verbose_lightgbm: -1
  verbose_catboost: 0
  enable_categorical: true
  tree_method: hist
  allow_writing_files: false
  n_estimators: 100
  max_depth: 7
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  n_trials: 100
  n_focused_trials: 50
  direction: minimize
  importance_type: gain

services:
  host: 0.0.0.0
  environment: development
  loop: uvloop
  http: httptools
  access_log: false
  backend: 8000
  predictor_eta: 8001
  predictor_fuel: 8002
  predictor_stops: 8003
  drift: 8004
  frontend: 8080
  summarizer: 8005

timelapse:
  speed_multiplier: 300
  interval_seconds: 1
  pause_poll_seconds: 0.1
  client_timeout_seconds: 5
  collect_seconds: 3600
  metrics_maxlen: 1000
  notifications_maxlen: 100

predictor:
  default_version: v1
  max_workers: 1

predictor_eta:
  source_x_column: source_x
  source_y_column: source_y
  destination_x_column: destination_x
  destination_y_column: destination_y
  time_start_column: time_start
  distance_column: distance

drift:
  smoothing_min_periods: 1
  consensus_threshold: 3
  smoothing_window_samples: 2500
  grace_period_samples: 5000
  calibration_window_samples: 10000
  adwin_delta_candidates: [0.01, 0.005, 0.002, 0.001, 0.0005, 0.0002, 0.0001, 0.00005, 0.00002, 0.00001, 0.000005, 0.000002, 0.000001, 5.0e-7, 1.0e-7, 5.0e-8, 1.0e-8, 5.0e-9, 1.0e-9, 5.0e-10, 1.0e-10, 5.0e-11, 1.0e-11, 5.0e-12, 1.0e-12, 5.0e-13, 1.0e-13, 5.0e-14, 1.0e-14, 5.0e-15, 1.0e-15]
  page_hinkley_delta_candidates: [0.0001, 0.001, 0.01, 0.1]
  page_hinkley_threshold_candidates: [2500.0, 5000.0, 10000.0, 20000.0, 50000.0, 200000.0, 500000.0]
  kswin_alpha_candidates: [0.001, 0.0005, 0.0001, 5.0e-5, 2.0e-5, 1.0e-5, 5.0e-6, 1.0e-6, 5.0e-7, 1.0e-7, 1.0e-8]
  kswin_window_size_stat_size_configs:
    - [6000, 3000]
    - [8000, 4000]
    - [11000, 5000]
    - [12500, 6000]
  spc_n_std_candidates: [3.0, 3.5, 4.0, 4.5, 5.0, 6.0]
  spc_min_std: 1.0e-6
  spc_consecutive_violations_required_multiplier_configs:
    - [4500, 450]
    - [5400, 540]
    - [7200, 720]

feature_categories:
  original: [source_x, source_y, destination_x, destination_y, time_start, distance]
  temporal: [hour_bin, is_morning, is_noon, is_afternoon, is_rush_hour]
  spatial: [x_center, y_center, x_difference, y_difference, euclidean_distance, route_efficiency, detour_length, trip_bearing, trip_bearing_sin, trip_bearing_cos, is_short_distance, is_medium_distance, is_long_distance, source_distance_from_city_center, destination_distance_from_city_center, trip_centrality_change, trip_centrality]
  fourier: [source_x_sin_0, source_x_sin_1, source_x_cos_0, source_x_cos_1, source_y_sin_0, source_y_sin_1, source_y_cos_0, source_y_cos_1, destination_x_sin_0, destination_x_sin_1, destination_x_cos_0, destination_x_cos_1, destination_y_sin_0, destination_y_sin_1, destination_y_cos_0, destination_y_cos_1]
  cell: [source_cell_x, source_cell_y, destination_cell_x, destination_cell_y]
  cluster: [source_cluster, destination_cluster]
  pca: [source_pca_1, source_pca_2, destination_pca_1, destination_pca_2]

fuel:
  time_start_column: timestep_time_min
  target_column: vehicle_fuel_log_sum
  random_seed: 42
  min_trip_points: 30
  n_start_clusters: 10
  n_end_clusters: 10
  n_init: 10
  start_hour_max: 10

stops:
  time_start_column: timestep
  target_column: actual_stops
  random_seed: 0
  n_clusters: 7
  n_init: 10
  min_trip_records: 2
  min_duration: 60.0
  min_distance: 500.0
  use_spatial_features: true
  use_route_features: true

summarizer:
  max_retries: 3
  retry_delay_seconds: 2.0
  async_client_timeout_seconds: 120.0
  openrouter_base_url: https://openrouter.ai/api/v1
  openrouter_model: z-ai/glm-4.5-air:free
  system_prompt: |
    You are an expert data scientist analyzing a machine learning simulation focused on concept drift detection and model retraining in a traffic prediction system.
    
    ## Simulation Context
    This simulation runs a 20-hour timelapse demonstration compressed to approximately 4 minutes (300x speed multiplier, 1 real second ≈ 5 simulation minutes):
    - **First 10 hours (0-36000 seconds)**: Baseline conditions from "test" dataset with normal road friction (1.0)
    - **Second 10 hours (36000-72000 seconds)**: Drift conditions from "rain" dataset with reduced friction (0.4), simulating adverse weather
    - **Data source**: SUMO traffic simulation of central Athens with ~55-60k trips per 10-hour period
    - **Ground truth**: Available immediately for real-time error calculation
    
    ## ML Tasks
    Three independent regression models predict different aspects of vehicle trips:
    1. **ETA (Estimated Time of Arrival)**: Predicts trip duration in seconds
    2. **Fuel**: Predicts fuel consumption during trips
    3. **Stops**: Predicts number of stops during trips
    
    Each model uses gradient boosting (LightGBM/XGBoost) with task-specific feature engineering.
    
    ## Drift Detection System
    A consensus-based drift detector monitors prediction errors using four algorithms:
    - **ADWIN** (Adaptive Windowing)
    - **Page-Hinkley** test
    - **KSWIN** (Kolmogorov-Smirnov Windowing)
    - **SPC** (Statistical Process Control)
    
    Drift is triggered when at least 3 out of 4 detectors agree (consensus threshold). The system then:
    1. Collects 1 hour (3600 seconds) of new data
    2. Retrains the affected model on recent samples
    3. Hot-swaps to the new model version
    4. Monitors for performance recovery
    
    ## Your Task
    You will receive:
    1. A chronological list of simulation notifications (system events, drift detection, retraining, model swaps)
    2. Time-series performance metrics (MAE - Mean Absolute Error) for each ML task
    
    Generate a comprehensive, professional markdown report that includes:
    
    ### Executive Summary
    - Brief overview of the simulation run and its purpose
    - Key findings and outcomes
    - Overall system effectiveness
    
    ### Simulation Timeline
    - Major events in chronological order with timestamps
    - Transition from baseline (test) to drift (rain) conditions at 36000 seconds
    - Context about environmental changes and their impact
    
    ### Performance Analysis
    For each ML task (ETA, Fuel, Stops):
    - Initial baseline performance (0-36000s)
    - Performance degradation patterns after drift introduction (36000s+)
    - Magnitude of performance impact
    - Effectiveness of retraining and recovery patterns
    
    ### Drift Detection Analysis
    - When drift was detected for each task (relative to the 36000s transition point)
    - Detection latency (time between drift introduction and detection)
    - Response time and actions taken
    - Effectiveness and sensitivity of the consensus-based detection system
    
    ### Model Retraining and Recovery
    - Retraining events, their timing, and duration
    - Performance recovery after model swaps
    - Comparison of pre-drift vs post-retrain performance
    - Overall effectiveness of the adaptive retraining system
    
    ### Insights and Recommendations
    - Key insights from the simulation results
    - System strengths and weaknesses observed
    - Potential improvements to detection or retraining strategies
    - Overall system health and readiness assessment
    
    ## Formatting Guidelines
    - Use clear, concise, professional language
    - Include specific numbers, timestamps (in seconds), and MAE values
    - Reference the 36000-second transition point when discussing drift
    - Use proper markdown headings, lists, bold/italic emphasis
    - Present data-driven conclusions backed by the metrics provided
    - Target length: around 400-500 words, do not exceed 600 words (comprehensive but focused)
    - Each section should be substantive but avoid unnecessary verbosity
    - Prioritize actionable insights over general observations
