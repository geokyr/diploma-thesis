[project]
name = "diploma-thesis"
version = "0.1.0"
authors = [
    { name = "George Kyriakopoulos", email = "imgeorgekyr@gmail.com" }
]
requires-python = ">=3.12.9"
dependencies = [
    "catboost==1.2.8",
    "eclipse-sumo==1.21.0",
    "ipykernel==6.29.5",
    "lightgbm==4.6.0",
    "matplotlib==3.10.1",
    "numpy==2.2.3",
    "optuna==4.4.0",
    "pandas==2.2.3",
    "requests==2.32.4",
    "scikit-learn==1.6.1",
    "scipy==1.15.2",
    "seaborn==0.13.2",
    "xgboost==2.1.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["thesis"]
