services:
  backend:
    container_name: backend
    build:
      dockerfile: ./thesis/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./appdata/logs:/app/logs
    environment:
      - SERVICE=backend
      - APP_DIR=/app
      - ENVIRONMENT=production
    depends_on:
      - redis
    healthcheck:
      test: curl -f http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  predictor-eta:
    container_name: predictor-eta
    build:
      dockerfile: ./thesis/predictor/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./appdata/models:/app/models
      - ./appdata/data:/app/data:ro
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc
    environment:
      - SERVICE=predictor-eta
      - APP_DIR=/app
      - ENVIRONMENT=production
    depends_on:
      - backend
    healthcheck:
      test: curl -f http://localhost:8001/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

