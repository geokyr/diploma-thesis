services:
  backend:
    container_name: backend
    build:
      dockerfile: ./thesis/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./appdata/logs:/app/logs
    environment:
      - SERVICE=backend
      - APP_DIR=/app
      - ENVIRONMENT=production
    depends_on:
      drift:
        condition: service_healthy
      predictor-eta:
        condition: service_healthy
      # predictor-fuel:
      #   condition: service_healthy
      # predictor-stops:
      #   condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  predictor-eta:
    container_name: predictor-eta
    build:
      dockerfile: ./thesis/predictor/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./appdata/models:/app/models
      - ./appdata/common:/app/common:ro
      - ./appdata/data:/app/data:ro
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc:ro
    environment:
      - SERVICE=predictor-eta
      - APP_DIR=/app
      - ENVIRONMENT=production
    healthcheck:
      test: curl -f http://localhost:8001/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  predictor-fuel:
    container_name: predictor-fuel
    build:
      dockerfile: ./thesis/predictor/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./appdata/models:/app/models
      - ./appdata/common:/app/common:ro
      - ./appdata/data:/app/data:ro
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc:ro
    environment:
      - SERVICE=predictor-fuel
      - APP_DIR=/app
      - ENVIRONMENT=production
    healthcheck:
      test: curl -f http://localhost:8002/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  predictor-stops:
    container_name: predictor-stops
    build:
      dockerfile: ./thesis/predictor/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./appdata/models:/app/models
      - ./appdata/common:/app/common:ro
      - ./appdata/data:/app/data:ro
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc:ro
    environment:
      - SERVICE=predictor-stops
      - APP_DIR=/app
      - ENVIRONMENT=production
    healthcheck:
      test: curl -f http://localhost:8003/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  drift:
    container_name: drift
    build:
      dockerfile: ./thesis/drift/Dockerfile
    ports:
      - "8004:8004"
    volumes:
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc:ro
    environment:
      - SERVICE=drift
      - APP_DIR=/app
      - ENVIRONMENT=production
    healthcheck:
      test: curl -f http://localhost:8004/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      dockerfile: ./thesis/frontend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./appdata/logs:/app/logs
    environment:
      - SERVICE=frontend
      - APP_DIR=/app
      - ENVIRONMENT=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8080/_dash-dependencies
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
