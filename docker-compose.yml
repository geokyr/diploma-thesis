  frontend:
    container_name: frontend
    build:
      dockerfile: ./thesis/frontend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./platform:/platform
      # TODO: remove this, only for dev
      - ./thesis/frontend:/app/thesis/frontend
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/_dash-dependencies"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
