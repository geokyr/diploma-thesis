  drift:
    container_name: drift
    build:
      dockerfile: ./thesis/drift/Dockerfile
    ports:
      - "8004:8004"
    volumes:
      - ./appdata/logs:/app/logs
    environment:
      - SERVICE=drift
      - APP_DIR=/app
      - ENVIRONMENT=production
    depends_on:
      - backend
    healthcheck:
      test: curl -f http://localhost:8004/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      dockerfile: ./thesis/frontend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./appdata/logs:/app/logs
    environment:
      - SERVICE=frontend
      - APP_DIR=/app
      - ENVIRONMENT=production
    depends_on:
      - backend
    healthcheck:
      test: curl -f http://localhost:8080/_dash-dependencies
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  redis:
    container_name: redis
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  redis_data:
