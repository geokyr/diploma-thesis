services:
  backend:
    container_name: backend
    build:
      dockerfile: ./thesis/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./platform:/platform
    depends_on:
      predictor-eta:
        condition: service_healthy
      # predictor-fuel:
      #   condition: service_healthy
      # predictor-stops:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  predictor-eta:
    container_name: predictor-eta
    build:
      dockerfile: ./thesis/predictor/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./platform:/platform
    environment:
      - TASK=eta
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

