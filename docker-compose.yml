services:
  backend:
    container_name: backend
    build:
      dockerfile: ./thesis/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./platform:/platform
    environment:
      - ETA_PREDICTOR_URL=http://eta-predictor:8001
      - FUEL_PREDICTOR_URL=http://fuel-predictor:8002
      - STOPS_PREDICTOR_URL=http://stops-predictor:8003
      - FRONTEND_URL=http://frontend:8080
      - PLATFORM_DIR=/platform
    depends_on:
      eta-predictor:
        condition: service_healthy
      # fuel-predictor:
      #   condition: service_healthy
      # stops-predictor:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  eta-predictor:
    container_name: eta-predictor
    build:
      dockerfile: ./thesis/predictors/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./platform:/platform
    environment:
      - TASK_TYPE=eta
      - BACKEND_URL=http://backend:8000
      - PLATFORM_DIR=/platform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

