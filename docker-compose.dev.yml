services:
  backend:
    container_name: backend
    build:
      dockerfile: ./thesis/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/shared
    environment:
      - ETA_PREDICTOR_URL=http://eta-predictor:8000
      - FUEL_PREDICTOR_URL=http://fuel-predictor:8000
      - STOPS_PREDICTOR_URL=http://stops-predictor:8000
      - FRONTEND_URL=http://frontend:8080
      - SHARED_DATA_PATH=/shared/data
      - SHARED_STATE_PATH=/shared/state
      - SHARED_MODELS_PATH=/shared/models
    depends_on:
      eta-predictor:
        condition: service_healthy
      # fuel-predictor:
      #   condition: service_healthy
      # stops-predictor:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  eta-predictor:
    container_name: eta-predictor
    build:
      dockerfile: ./thesis/predictors/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./shared:/shared
    environment:
      - TASK=eta
      - BACKEND_URL=http://backend:8000
      - SHARED_MODELS_PATH=/shared/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

