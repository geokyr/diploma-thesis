      - ./appdata/logs:/app/logs
      - ./thesis:/app/thesis
    environment:
      - SERVICE=drift
      - APP_DIR=/app
      - ENVIRONMENT=development
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8004", "--reload", "--log-level", "debug"]

