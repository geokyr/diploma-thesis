services:
  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./appdata/logs:/app/logs
      - ./thesis:/app/thesis
    environment:
      - SERVICE=backend
      - APP_DIR=/app
      - ENVIRONMENT=development

  predictor-eta:
    ports:
      - "8001:8001"
    volumes:
      - ./appdata/models:/app/models
      - ./appdata/common:/app/common:ro
      - ./appdata/data:/app/data:ro
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc:ro
      - ./thesis:/app/thesis
    environment:
      - SERVICE=predictor-eta
      - APP_DIR=/app
      - ENVIRONMENT=development

  predictor-fuel:
    ports:
      - "8002:8002"
    volumes:
      - ./appdata/models:/app/models
      - ./appdata/common:/app/common:ro
      - ./appdata/data:/app/data:ro
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc:ro
      - ./thesis:/app/thesis
    environment:
      - SERVICE=predictor-fuel
      - APP_DIR=/app
      - ENVIRONMENT=development

  predictor-stops:
    ports:
      - "8003:8003"
    volumes:
      - ./appdata/models:/app/models
      - ./appdata/common:/app/common:ro
      - ./appdata/data:/app/data:ro
      - ./appdata/logs:/app/logs
      - ./appdata/misc:/app/misc:ro
      - ./thesis:/app/thesis
    environment:
      - SERVICE=predictor-stops
      - APP_DIR=/app
      - ENVIRONMENT=development

  drift:
    ports:
      - "8004:8004"
    volumes:
      - ./appdata/logs:/app/logs
      - ./thesis:/app/thesis
    environment:
      - SERVICE=drift
      - APP_DIR=/app
      - ENVIRONMENT=development

  frontend:
    volumes:
      - ./appdata/logs:/app/logs
      - ./thesis:/app/thesis
    environment:
      - SERVICE=frontend
      - APP_DIR=/app
      - ENVIRONMENT=development

  summarizer:
    ports:
      - "8005:8005"
    volumes:
      - ./appdata/logs:/app/logs
      - ./thesis:/app/thesis
    environment:
      - SERVICE=summarizer
      - APP_DIR=/app
      - ENVIRONMENT=development
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
